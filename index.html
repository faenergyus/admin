<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAE Admin — User Management</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="admin-shell.css">
<style>
  :root { --bg:#f5f4f1; --header:#d9d9d9; --panel:#fff; --panel2:#f1f0ec;
          --line:#d8dadd; --txt:#1a1a1a; --muted:#6b7177;
          --green:#5b626b; --green-d:#2b3036; --gold:#5b626b;
          --red:#c0392b; --blue:#2b6cb0; --amber:#b7791f; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font-family:-apple-system,"Segoe UI",Roboto,sans-serif; overflow-x:hidden; }
  /* header + sidebar chrome lives in admin-shell.css */
  .gate { text-align:center; padding:80px 20px; color:var(--muted); }
  .gate h2 { color:var(--green-d); }
  .gate a { color:var(--green); }
  .card { background:var(--panel); border:1px solid var(--line); border-top:3px solid var(--green);
          border-radius:11px; padding:16px 18px; margin-bottom:18px;
          box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .card h3 { margin:0 0 12px; font-size:.62rem; text-transform:uppercase;
             letter-spacing:.12em; font-weight:700; color:#9aa0a6; }
  .addgrid { display:grid; grid-template-columns:1.6fr 1fr 1fr .9fr auto;
             gap:10px; align-items:end; }
  label.f { display:flex; flex-direction:column; gap:4px; font-size:11px; color:var(--muted); }
  input, select { background:#fff; border:1px solid var(--line); color:var(--txt);
                  border-radius:6px; padding:8px 9px; font-size:13px; width:100%; }
  input:focus, select:focus { outline:none; border-color:var(--green); }
  button.btn { background:var(--green); color:#fff; border:none; border-radius:6px;
               padding:9px 16px; font-weight:600; cursor:pointer; font-size:13px; }
  button.btn:hover { background:var(--green-d); }
  button.btn:disabled { opacity:.5; cursor:default; }
  button.ghost { background:#fff; border:1px solid var(--line); color:#444a50;
                 border-radius:6px; padding:6px 10px; cursor:pointer; font-size:12px; }
  button.ghost:hover { background:var(--bg); }
  button.danger { border-color:var(--red); color:var(--red); }
  button.danger:hover { background:rgba(192,57,43,.07); }
  .tablewrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; min-width:760px; }
  th { text-align:left; color:var(--muted); font-weight:700; font-size:11px;
       text-transform:uppercase; letter-spacing:.5px; padding:8px 10px;
       border-bottom:2px solid var(--line); position:sticky; top:0; background:var(--panel); }
  td { padding:7px 10px; border-bottom:1px solid #eee; vertical-align:middle; }
  tr.inactive td { opacity:.5; }
  td .em { font-weight:600; }
  td.sub { color:var(--muted); font-size:11px; }
  .pill { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px;
          font-weight:600; }
  .pill.editor { background:rgba(90,98,107,.15); color:var(--green-d); }
  .pill.read   { background:rgba(106,138,106,.14); color:var(--muted); }
  .rowbtns { display:flex; gap:6px; justify-content:flex-end; }
  #msg { margin:0 0 14px; padding:10px 14px; border-radius:8px; font-size:13px; display:none; }
  #msg.ok  { display:block; background:rgba(90,98,107,.13); color:var(--green-d); }
  #msg.err { display:block; background:rgba(192,57,43,.10); color:#a32020; }
  .dirty input, .dirty select { border-color:var(--gold); }
  @media (max-width:760px){
    .addgrid { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body data-page="users">
<div class="app">
  <header class="ahead">
    <button class="burger" id="burger" aria-label="Toggle menu">&#9776;</button>
    <img class="logo" src="light-40aclogo.png" alt="40ac" onerror="this.style.display='none'">
    <span class="fae-appnav" data-current="admin"></span>
    <span class="spacer"></span>
    <div id="badge"></div>
  </header>
  <div class="asplit">
    <aside class="asidebar"><nav>
      <a href="index.html"  data-p="users"><span class="ic">&#9707;</span>Users</a>
      <a href="health.html" data-p="health"><span class="ic">&#9829;</span>Health</a>
      <a href="queue.html"  data-p="queue"><span class="ic">&#8801;</span>Queue</a>
      <a href="review.html" data-p="review"><span class="ic">&#9873;</span>Review</a>
    </nav></aside>
    <main class="acontent">
  <div id="gate" class="gate">Checking access…</div>

  <div id="app" style="display:none">
    <div id="msg"></div>

    <div class="card">
      <h3>Add user</h3>
      <div class="addgrid">
        <label class="f">Email<input id="add-email" type="email" placeholder="name@gmail.com"></label>
        <label class="f">Display name<input id="add-display" type="text" placeholder="First"></label>
        <label class="f">PBI name<input id="add-pbi" type="text" placeholder="Pumper name"></label>
        <label class="f">Role<select id="add-role"></select></label>
        <button class="btn" id="add-btn">Add</button>
      </div>
    </div>

    <div class="card">
      <h3>Users (<span id="ucount">0</span>)</h3>
      <div class="tablewrap">
        <table>
          <thead><tr>
            <th>Email</th><th>Display</th><th>PBI</th><th>Role</th>
            <th>Active</th><th>Last sign-in</th><th>Signins</th><th></th>
          </tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>
    </main>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="admin-shell.js"></script>
<script>
const API = 'https://api.40ac.us';
window.faeApiBase = API;
const GOOGLE_CLIENT_ID = '629380732564-eh0uasomqjdo3up8o2po685g9ep544iq.apps.googleusercontent.com';
const SESSION_KEY = 'fae_user';

// ── cross-subdomain SSO: hydrate fae_user from the .40ac.us cookie ──────────
(function () {
  try {
    var m = document.cookie.match(/(?:^|;\s*)fae40_sso=([^;]+)/);
    if (m && !localStorage.getItem(SESSION_KEY))
      localStorage.setItem(SESSION_KEY, decodeURIComponent(m[1]));
  } catch (e) {}
  try {
    var _set = localStorage.setItem.bind(localStorage);
    var _rem = localStorage.removeItem.bind(localStorage);
    localStorage.setItem = function (k, v) { _set(k, v);
      if (k === SESSION_KEY) { try { document.cookie = 'fae40_sso=' +
        encodeURIComponent(v) + ';domain=.40ac.us;path=/;max-age=2592000;Secure;SameSite=Lax'; } catch (e) {} } };
    localStorage.removeItem = function (k) { _rem(k);
      if (k === SESSION_KEY) { try { document.cookie =
        'fae40_sso=;domain=.40ac.us;path=/;max-age=0;Secure;SameSite=Lax'; } catch (e) {} } };
  } catch (e) {}
})();

function session() { try { return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); } catch (e) { return null; } }
function signOut() { localStorage.removeItem(SESSION_KEY); location.reload(); }

// GSI fallback sign-in (only if no SSO session). Decodes the JWT for email/name.
function handleCredential(resp) {
  try {
    var p = JSON.parse(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      credential: resp.credential, email: p.email, displayName: p.name || p.given_name || p.email,
      picture: p.picture, expires: Date.now() + 30*86400*1000 }));
    location.reload();
  } catch (e) { showGateError('Sign-in failed.'); }
}
function renderSignIn() {
  var g = document.getElementById('gate');
  g.innerHTML = '<h2>FAE Admin</h2><p>Admin-only. Please sign in with your FAE Google account.</p>' +
                '<div id="gbtn" style="display:flex;justify-content:center;margin-top:18px"></div>';
  function draw() {
    if (!(window.google && google.accounts && google.accounts.id)) return setTimeout(draw, 200);
    google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredential });
    google.accounts.id.renderButton(document.getElementById('gbtn'), { theme:'filled_black', size:'large' });
  }
  draw();
}
function showGate(html, cls) { var g=document.getElementById('gate'); g.className='gate'; g.innerHTML=html; }
function showGateError(t) { showGate('<h2>Not authorized</h2><p>'+t+'</p>'); }
function flash(t, ok) { var m=document.getElementById('msg'); m.textContent=t; m.className=ok?'ok':'err';
  setTimeout(function(){ if(m.textContent===t) m.className=''; }, 4000); }

const EDITOR_ROLES = new Set(['engineer','admin','tech']);
let ROLES = [];

function roleOptions(sel) {
  return ROLES.map(function(r){ return '<option value="'+r.role+'"'+(r.role===sel?' selected':'')+'>'+r.role+'</option>'; }).join('');
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function fmtDt(s){ if(!s) return '—'; var d=new Date(s.replace(' ','T')+(s.indexOf('Z')<0?'Z':'')); return isNaN(d)?'—':d.toLocaleDateString()+' '+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

async function api(path, opts) { return window.faeAuth.fetchAuthed(API, API + path, opts); }

async function loadRoles() {
  var r = await api('/admin/roles'); if (!r.ok) throw new Error('roles '+r.status);
  ROLES = (await r.json()).roles || [];
  document.getElementById('add-role').innerHTML = roleOptions('pumper');
}

async function loadUsers() {
  var r = await api('/admin/users'); if (!r.ok) throw new Error('users '+r.status);
  var users = (await r.json()).users || [];
  document.getElementById('ucount').textContent = users.length;
  var tb = document.getElementById('rows'); tb.innerHTML = '';
  users.forEach(function (u) {
    var tr = document.createElement('tr');
    tr.className = u.active ? '' : 'inactive';
    tr.innerHTML =
      '<td class="em">'+esc(u.email)+'</td>' +
      '<td><input data-f="display_name" value="'+esc(u.display_name)+'" style="width:90px"></td>' +
      '<td><input data-f="pbi_name" value="'+esc(u.pbi_name)+'" style="width:90px"></td>' +
      '<td><select data-f="role">'+roleOptions((u.role||'').toLowerCase())+'</select></td>' +
      '<td><input data-f="active" type="checkbox"'+(u.active?' checked':'')+'></td>' +
      '<td class="sub">'+fmtDt(u.last_signin)+'</td>' +
      '<td class="sub">'+(u.signin_count||0)+'</td>' +
      '<td><div class="rowbtns">' +
        '<button class="ghost save" disabled>Save</button>' +
        '<button class="ghost danger del">Remove</button>' +
      '</div></td>';
    var email = u.email;
    var saveBtn = tr.querySelector('.save');
    tr.querySelectorAll('[data-f]').forEach(function (el) {
      el.addEventListener('input', function(){ tr.classList.add('dirty'); saveBtn.disabled=false; });
      el.addEventListener('change', function(){ tr.classList.add('dirty'); saveBtn.disabled=false; });
    });
    saveBtn.addEventListener('click', function(){ saveRow(tr, email, saveBtn); });
    tr.querySelector('.del').addEventListener('click', function(){ delUser(email); });
    tb.appendChild(tr);
  });
}

async function saveRow(tr, email, btn) {
  var body = {};
  tr.querySelectorAll('[data-f]').forEach(function (el) {
    body[el.dataset.f] = el.type === 'checkbox' ? el.checked : el.value;
  });
  btn.disabled = true;
  var r = await api('/admin/users/' + encodeURIComponent(email), {
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (r.ok) { tr.classList.remove('dirty'); flash('Saved '+email, true); }
  else { btn.disabled=false; flash('Save failed: '+(await r.text()), false); }
}

async function delUser(email) {
  if (!confirm('Deactivate ' + email + '? (soft-delete — recoverable)')) return;
  var r = await api('/admin/users/' + encodeURIComponent(email), { method:'DELETE' });
  if (r.ok) { flash('Deactivated '+email, true); loadUsers(); }
  else flash('Remove failed: '+(await r.text()), false);
}

async function addUser() {
  var body = {
    email: document.getElementById('add-email').value.trim(),
    display_name: document.getElementById('add-display').value.trim(),
    pbi_name: document.getElementById('add-pbi').value.trim(),
    role: document.getElementById('add-role').value };
  if (!body.email) return flash('Email required', false);
  var btn = document.getElementById('add-btn'); btn.disabled = true;
  var r = await api('/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  btn.disabled = false;
  if (r.ok) { ['add-email','add-display','add-pbi'].forEach(function(id){document.getElementById(id).value='';});
              flash('Added '+body.email, true); loadUsers(); }
  else flash('Add failed: '+(await r.text()), false);
}

async function boot() {
  var s = session();
  if (!s) { renderSignIn(); return; }
  document.getElementById('badge').innerHTML =
    '<span>'+esc(s.displayName || s.email || '')+'</span><button onclick="signOut()">Sign out</button>';
  // ensure a session token, then check role
  try { await window.faeAuth.ensureSessionToken(API); } catch (e) {}
  var role = null;
  try { role = await window.faeAuth.ensureUserRole(true); } catch (e) {}
  if (role !== 'admin') {
    showGateError('This page is restricted to admin accounts.' +
      (role ? ' Your role is <b>'+esc(role)+'</b>.' : ' No role found for ' + esc(s.email||'') + '.'));
    return;
  }
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('add-btn').addEventListener('click', addUser);
  try { await loadRoles(); await loadUsers(); }
  catch (e) { document.getElementById('app').style.display='none'; showGateError('Failed to load: '+e.message); }
}

window.addEventListener('DOMContentLoaded', boot);
</script>
<script src="fae-auth.js?v=12"></script>
<script src="fae-header.js?v=2"></script>
</body>
</html>
