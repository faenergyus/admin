<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAE Admin — Platform Health</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=3">
<link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png?v=3">
<link rel="stylesheet" href="admin-shell.css">
<style>
  :root { --bg:#f5f4f1; --header:#d9d9d9; --panel:#fff; --panel2:#f7f6f2;
          --line:#d8dadd; --txt:#1a1a1a; --muted:#6b7177;
          --green:#5b626b; --green-d:#2b3036;
          --red:#c0392b; --blue:#2b6cb0; --amber:#b7791f; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font-family:-apple-system,"Segoe UI",Roboto,sans-serif; overflow-x:hidden; }
  /* header + sidebar chrome lives in admin-shell.css */
  .gate { text-align:center; padding:80px 20px; color:var(--muted); }
  .gate h2 { color:var(--green-d); }
  .topline { display:flex; align-items:center; gap:14px; margin-bottom:16px; color:var(--muted); font-size:12px; }
  .topline button { background:#fff; border:1px solid var(--line); color:#444a50;
                    border-radius:6px; padding:5px 12px; cursor:pointer; font-size:12px; }
  .topline button:hover { background:var(--bg); }
  .card { background:var(--panel); border:1px solid var(--line); border-top:3px solid var(--green);
          border-radius:11px; padding:16px 18px; margin-bottom:18px;
          box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .card h3 { margin:0 0 14px; font-size:.62rem; text-transform:uppercase;
             letter-spacing:.12em; font-weight:700; color:#9aa0a6; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; vertical-align:middle; }
  .green{background:var(--green)} .red{background:var(--red)} .blue{background:var(--blue)}
  .amber{background:var(--amber)} .dim{background:#9aa0a6}
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
  .kpi { background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:12px 14px; }
  .kpi .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .kpi .val { font-size:20px; font-weight:700; margin-top:5px; }
  .kpi .sub { font-size:11px; color:var(--muted); margin-top:3px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:var(--muted); font-weight:700; font-size:11px; text-transform:uppercase;
       letter-spacing:.5px; padding:8px 10px; border-bottom:2px solid var(--line); }
  td { padding:7px 10px; border-bottom:1px solid #eee; }
  tr.bad td { background:rgba(192,57,43,.07); }
  tr.dimrow td { opacity:.5; }
  .badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; }
  .b-green{background:rgba(90,98,107,.15);color:var(--green-d)}
  .b-red{background:rgba(192,57,43,.12);color:#a32020}
  .b-blue{background:rgba(43,108,176,.14);color:#1d4e80}
  .b-amber{background:rgba(183,121,31,.16);color:#8a5a12}
  .b-dim{background:rgba(106,138,106,.14);color:var(--muted)}
  .tablewrap { overflow-x:auto; }
  .sub2 { color:var(--muted); font-size:11px; }
  .filters { display:flex; gap:14px; margin-bottom:10px; font-size:12px; color:var(--muted); align-items:center; }
  .filters label { cursor:pointer; }
  @media (max-width:760px){ }
</style>
</head>
<body data-page="health">
<div class="app">
  <header class="ahead">
    <button class="burger" id="burger" aria-label="Toggle menu">&#9776;</button>
    <img class="logo" src="light-40aclogo.png" alt="40ac" onerror="this.style.display='none'">
    <span class="fae-appnav" data-current="admin"></span>
    <span class="spacer"></span>
    <div id="badge"></div>
  </header>
  <div class="asplit">
    <aside class="asidebar"><nav>
      <a href="index.html"  data-p="users"><span class="ic">&#9707;</span>Users</a>
      <a href="health.html" data-p="health"><span class="ic">&#9829;</span>Health</a>
      <a href="queue.html"  data-p="queue"><span class="ic">&#8801;</span>Queue</a>
      <a href="review.html" data-p="review"><span class="ic">&#9873;</span>Review</a>
    </nav></aside>
    <main class="acontent">
  <div id="gate" class="gate">Checking access…</div>
  <div id="app" style="display:none">
    <div class="topline">
      <span id="ts">—</span>
      <button id="refresh">↻ Refresh</button>
      <label style="font-size:12px"><input type="checkbox" id="auto" checked> auto (30s)</label>
    </div>

    <div class="card">
      <h3>API · Cloudflare tunnel</h3>
      <div class="kpis" id="api-kpis"></div>
    </div>

    <div class="card">
      <h3>Databases</h3>
      <div class="tablewrap"><table>
        <thead><tr><th>Database</th><th>Status</th><th>Latency</th><th>Metric</th><th>Detail</th></tr></thead>
        <tbody id="db-rows"></tbody>
      </table></div>
    </div>

    <div class="card">
      <h3>SQL Agent jobs — SF\SQLDEV (<span id="job-count">0</span>)</h3>
      <div class="filters"><span id="job-summary"></span></div>
      <div id="job-notice" class="sub2" style="display:none"></div>
      <div class="tablewrap"><table>
        <thead><tr><th>Job</th><th>Enabled</th><th>Last run</th><th>Outcome</th><th>Next run</th></tr></thead>
        <tbody id="job-rows"></tbody>
      </table></div>
    </div>

    <div class="card">
      <h3>Scheduled tasks — svrxspoc (<span id="task-count">0</span>)</h3>
      <div class="filters">
        <span id="task-summary"></span>
        <label><input type="checkbox" id="only-issues"> only issues</label>
      </div>
      <div class="tablewrap"><table>
        <thead><tr><th>Task</th><th>State</th><th>Last run</th><th>Result</th><th>Next run</th></tr></thead>
        <tbody id="task-rows"></tbody>
      </table></div>
    </div>
  </div>
    </main>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="admin-shell.js"></script>
<script>
const API = 'https://api.40ac.us';
window.faeApiBase = API;
const GOOGLE_CLIENT_ID = '629380732564-eh0uasomqjdo3up8o2po685g9ep544iq.apps.googleusercontent.com';
const SESSION_KEY = 'fae_user';

(function () {
  try {
    var m = document.cookie.match(/(?:^|;\s*)fae40_sso=([^;]+)/);
    if (m && !localStorage.getItem(SESSION_KEY))
      localStorage.setItem(SESSION_KEY, decodeURIComponent(m[1]));
  } catch (e) {}
  try {
    var _set = localStorage.setItem.bind(localStorage), _rem = localStorage.removeItem.bind(localStorage);
    localStorage.setItem = function (k, v) { _set(k, v);
      if (k === SESSION_KEY) { try { document.cookie = 'fae40_sso=' + encodeURIComponent(v) +
        ';domain=.40ac.us;path=/;max-age=2592000;Secure;SameSite=Lax'; } catch (e) {} } };
    localStorage.removeItem = function (k) { _rem(k);
      if (k === SESSION_KEY) { try { document.cookie =
        'fae40_sso=;domain=.40ac.us;path=/;max-age=0;Secure;SameSite=Lax'; } catch (e) {} } };
  } catch (e) {}
})();

function session() { try { return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); } catch (e) { return null; } }
function signOut() { localStorage.removeItem(SESSION_KEY); location.reload(); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function showGate(html){ var g=document.getElementById('gate'); g.style.display='block'; g.innerHTML=html; }

function handleCredential(resp) {
  try {
    var p = JSON.parse(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    localStorage.setItem(SESSION_KEY, JSON.stringify({ credential: resp.credential, email: p.email,
      displayName: p.name || p.email, picture: p.picture, expires: Date.now()+30*86400*1000 }));
    location.reload();
  } catch (e) { showGate('<h2>Sign-in failed</h2>'); }
}
function renderSignIn() {
  showGate('<h2>FAE Admin</h2><p>Admin-only. Sign in with your FAE Google account.</p>' +
           '<div id="gbtn" style="display:flex;justify-content:center;margin-top:18px"></div>');
  (function draw(){ if(!(window.google&&google.accounts&&google.accounts.id)) return setTimeout(draw,200);
    google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID, callback:handleCredential});
    google.accounts.id.renderButton(document.getElementById('gbtn'),{theme:'filled_black',size:'large'}); })();
}

function fmtUptime(s){ if(s==null) return '—'; var d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);
  return (d?d+'d ':'')+(h?h+'h ':'')+m+'m'; }
function dot(c){ return '<span class="dot '+c+'"></span>'; }

function taskResult(code, state){
  if (state==='Disabled') return {t:'Disabled', c:'b-dim', bad:false, dim:true};
  if (code===267009) return {t:'Running', c:'b-blue', bad:false};
  if (code===0) return {t:'OK', c:'b-green', bad:false};
  if (code===267011) return {t:'Never run', c:'b-dim', bad:false, dim:true};
  if (code===267014) return {t:'Stopped', c:'b-amber', bad:false};
  return {t:'FAILED ('+code+')', c:'b-red', bad:true};
}

function jobOutcome(o, running, enabled){
  if (running) return {t:'Running', c:'b-blue', bad:false};
  if (!enabled) return {t:'Disabled', c:'b-dim', bad:false, dim:true};
  if (o===1) return {t:'Succeeded', c:'b-green', bad:false};
  if (o===0) return {t:'Failed', c:'b-red', bad:true};
  if (o===3) return {t:'Canceled', c:'b-amber', bad:false};
  return {t:'Never run', c:'b-dim', bad:false, dim:true};   // 5 / null
}

let LAST = null;
function render(d){
  LAST = d;
  document.getElementById('ts').textContent = 'as of ' + d.generated_at + ' (server)';

  // API / tunnel
  var a = d.api||{}, t = d.tunnel||{};
  var twHigh = (t.time_wait||0) > 200;
  document.getElementById('api-kpis').innerHTML = [
    ['API', dot(a.up?'green':'red') + (a.up?'Up':'Down'), 'uptime ' + fmtUptime(a.uptime_sec)],
    ['Database', dot(a.db_connected?'green':'red') + (a.db_connected?'Connected':'Error'), esc(a.db_error||'')],
    ['Cloudflared', dot(t.cloudflared_running?'green':'red') + (t.cloudflared_running?'Running':'Down'),
       t.cloudflared_start?('since '+esc(t.cloudflared_start)):''],
    ['Port 8080', dot((t.listen_8080||0)>=1?'green':'red') + ((t.listen_8080||0)+' listener'), ''],
    ['Established', (t.established!=null?t.established:'—'), 'live conns'],
    ['TIME_WAIT', dot(twHigh?'amber':'green') + (t.time_wait!=null?t.time_wait:'—'), twHigh?'elevated':'normal'],
  ].map(function(k){ return '<div class="kpi"><div class="lbl">'+k[0]+'</div><div class="val">'+k[1]+
      '</div><div class="sub">'+k[2]+'</div></div>'; }).join('');

  // databases
  document.getElementById('db-rows').innerHTML = (d.databases||[]).map(function(db){
    var m = (db.metric!=null && db.metric_label) ? (esc(db.metric_label)+': '+esc(db.metric)) : '';
    var slow = db.ms!=null && db.ms>1000;
    return '<tr'+(db.ok?'':' class="bad"')+'><td>'+esc(db.label)+'</td>'+
      '<td>'+dot(db.ok?'green':'red')+(db.ok?'OK':'FAIL')+'</td>'+
      '<td'+(slow?' style="color:var(--amber)"':'')+'>'+(db.ms!=null?db.ms+' ms':'—')+'</td>'+
      '<td>'+m+'</td><td class="sub2">'+esc(db.error||'')+'</td></tr>';
  }).join('');

  // SQL Agent jobs (SF\SQLDEV)
  var aj = d.agent_jobs || {ok:false, jobs:[], error:'no data'};
  var notice = document.getElementById('job-notice');
  var jrows = document.getElementById('job-rows');
  if (!aj.ok) {
    document.getElementById('job-count').textContent = 0;
    document.getElementById('job-summary').innerHTML = '';
    notice.style.display = 'block';
    notice.innerHTML = '⚠ Cannot read SQL Agent jobs yet — the API identity needs a one-time grant on '+
      'SF\\SQLDEV (msdb SQLAgentReaderRole). <span style="opacity:.7">'+esc(aj.error||'')+'</span>';
    jrows.innerHTML = '';
  } else {
    notice.style.display = 'none';
    var jm = (aj.jobs||[]).map(function(x){ return Object.assign({}, x, {_o: jobOutcome(x.last_outcome, x.running, x.enabled)}); });
    var jBad = jm.filter(function(x){return x._o.bad;}).length;
    var jRun = jm.filter(function(x){return x.running;}).length;
    var jDis = jm.filter(function(x){return !x.enabled;}).length;
    document.getElementById('job-count').textContent = jm.length;
    document.getElementById('job-summary').innerHTML =
      dot('green')+(jm.length-jBad-jDis)+' ok &nbsp; '+dot('red')+jBad+' failed &nbsp; '+dot('blue')+jRun+' running &nbsp; '+dot('dim')+jDis+' disabled';
    jm.sort(function(x,y){ return (y._o.bad?1:0)-(x._o.bad?1:0) || x.name.localeCompare(y.name); });
    jrows.innerHTML = jm.map(function(x){
      return '<tr'+(x._o.bad?' class="bad"':(x._o.dim?' class="dimrow"':''))+'>'+
        '<td>'+esc(x.name)+'</td><td class="sub2">'+(x.enabled?'yes':'no')+'</td>'+
        '<td class="sub2">'+esc(x.last_run||'—')+'</td>'+
        '<td><span class="badge '+x._o.c+'">'+x._o.t+'</span></td>'+
        '<td class="sub2">'+esc(x.next_run||'—')+'</td></tr>';
    }).join('');
  }

  // tasks — drop one-shot/finished tasks (no next run), but keep anything
  // currently running (the always-on services have no "next run" by nature).
  var tasks = (d.tasks||[]).filter(function(x){ return x.next_run || x.result===267009; });
  var meta = tasks.map(function(x){ return Object.assign({}, x, {_r: taskResult(x.result, x.state)}); });
  var nBad = meta.filter(function(x){return x._r.bad;}).length;
  var nRun = meta.filter(function(x){return x.result===267009;}).length;
  var nDis = meta.filter(function(x){return x.state==='Disabled';}).length;
  var nOk  = meta.length - nBad - nDis;
  document.getElementById('task-count').textContent = meta.length;
  document.getElementById('task-summary').innerHTML =
    dot('green')+nOk+' ok &nbsp; '+dot('red')+nBad+' failed &nbsp; '+dot('blue')+nRun+' running &nbsp; '+dot('dim')+nDis+' disabled';
  var onlyIssues = document.getElementById('only-issues').checked;
  meta.sort(function(x,y){ return (y._r.bad?1:0)-(x._r.bad?1:0) || x.name.localeCompare(y.name); });
  if (onlyIssues) meta = meta.filter(function(x){ return x._r.bad; });
  var now = new Date();
  document.getElementById('task-rows').innerHTML = meta.map(function(x){
    var overdue = x.next_run && x.state==='Ready' && new Date(x.next_run.replace(' ','T')) < now && !x._r.bad && x.result!==267009;
    return '<tr'+(x._r.bad?' class="bad"':(x._r.dim?' class="dimrow"':''))+'>'+
      '<td>'+esc(x.name)+'</td><td class="sub2">'+esc(x.state)+'</td>'+
      '<td class="sub2">'+esc(x.last_run||'—')+'</td>'+
      '<td><span class="badge '+x._r.c+'">'+x._r.t+'</span>'+(overdue?' <span class="badge b-amber">overdue</span>':'')+'</td>'+
      '<td class="sub2">'+esc(x.next_run||'—')+'</td></tr>';
  }).join('');
}

async function load(){
  var btn=document.getElementById('refresh'); btn.disabled=true; btn.textContent='…';
  try {
    var r = await window.faeAuth.fetchAuthed(API, API+'/admin/health');
    if (r.ok) render(await r.json());
    else document.getElementById('ts').textContent = 'load error '+r.status;
  } catch(e){ document.getElementById('ts').textContent='load error'; }
  btn.disabled=false; btn.textContent='↻ Refresh';
}

let timer=null;
function setAuto(){ if(timer) clearInterval(timer); if(document.getElementById('auto').checked) timer=setInterval(load,30000); }

async function boot(){
  var s = session();
  if (!s) { renderSignIn(); return; }
  document.getElementById('badge').innerHTML =
    '<span>'+esc(s.displayName||s.email||'')+'</span><button onclick="signOut()">Sign out</button>';
  try { await window.faeAuth.ensureSessionToken(API); } catch(e){}
  var role=null; try { role = await window.faeAuth.ensureUserRole(true); } catch(e){}
  if (role !== 'admin') { showGate('<h2>Not authorized</h2><p>Admin only'+(role?' — your role is <b>'+esc(role)+'</b>':'')+'.</p>'); return; }
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('refresh').addEventListener('click', load);
  document.getElementById('auto').addEventListener('change', setAuto);
  document.getElementById('only-issues').addEventListener('change', function(){ if(LAST) render(LAST); });
  await load(); setAuto();
}
window.addEventListener('DOMContentLoaded', boot);
</script>
<script src="fae-auth.js?v=12"></script>
<script src="fae-header.js?v=2"></script>
</body>
</html>
